<!DOCTYPE html>
<html>
<head>
<title>Call</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
<h2>Calling {{ target }}</h2>

<button onclick="accept()">Accept</button>
<button onclick="reject()">Reject</button>

<p id="status">Waiting...</p>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();

let incomingCaller = "";

// REGISTER
socket.on("connect", ()=>{
    socket.emit("register", {email: "{{ email }}"});
});

// CALL BUTTON (SENDER)
function callUser(){
    let target = document.getElementById("target").value;

    socket.emit("call_user", {
        to: target,
        from: "{{ email }}"
    });

    alert("Calling " + target);
}

// 🔥 RECEIVER SIDE (THIS WAS MISSING)
socket.on("incoming_call", (data)=>{
    incomingCaller = data.from;

    document.getElementById("popup").style.display = "block";
    document.getElementById("caller").innerText =
        "Incoming call from " + data.from;
});

// ACCEPT
function acceptCall(){
    socket.emit("accept_call", {
        to: incomingCaller,
        from: "{{ email }}"
    });

    window.open("/call?target="+incomingCaller, "_blank");
}

// REJECT
function rejectCall(){
    socket.emit("reject_call", {
        to: incomingCaller,
        from: "{{ email }}"
    });

    document.getElementById("popup").style.display = "none";
}

// RESPONSE TO CALLER
socket.on("call_accepted", ()=>{
    window.open("/call?target={{ email }}", "_blank");
});

socket.on("call_rejected", ()=>{
    alert("Call Rejected");
});
</script>

</body>
</html>
