<!DOCTYPE html>
<html>
<head>
<title>Call</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: url('https://images.unsplash.com/photo-1525186402429-b4ff38bedbec') no-repeat center/cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box {
    background: rgba(0,0,0,0.7);
    padding:30px;
    border-radius:15px;
    text-align:center;
}

button {
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>📞 Voice Call</h2>
<p id="status">Connecting...</p>

<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>

<audio id="remoteAudio" autoplay></audio>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();

let pc;
let localStream;
let target = "{{ target }}";
const myEmail = "{{ email }}";

// MIC ACCESS
navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{
    localStream = stream;
});

// CREATE PEER
function createPeer(){
    pc = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    localStream.getTracks().forEach(track=>{
        pc.addTrack(track, localStream);
    });

    pc.ontrack = e=>{
        document.getElementById("remoteAudio").srcObject = e.streams[0];
    };

    pc.onicecandidate = e=>{
        if(e.candidate){
            socket.emit("ice_candidate",{to:target,candidate:e.candidate});
        }
    };
}

// CALL USER
function startCall(){
    socket.emit("call_user", {
        to: target,
        from: myEmail
    });
}

// OFFER
socket.on("webrtc_offer", async data=>{
    createPeer();

    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("webrtc_answer",{to:data.from,answer:answer});

    document.getElementById("status").innerText = "Call Connected";
});

// ANSWER
socket.on("webrtc_answer", async data=>{
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    document.getElementById("status").innerText = "Call Connected";
});

// ICE
socket.on("ice_candidate", async data=>{
    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
});
</script>

</body>
</html>
