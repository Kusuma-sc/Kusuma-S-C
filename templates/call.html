<!DOCTYPE html>
<html>
<head>
    <title>Call</title>
</head>
<body>

<h2>Calling Page</h2>

<h3 id="status">Waiting...</h3>

<button id="acceptBtn" style="display:none;">Accept</button>
<button id="rejectBtn" style="display:none;">Reject</button>

<audio id="remoteAudio" autoplay></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();
let peer;
let localStream;
let caller = null;

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    localStream = stream;
});

// CREATE PEER
function createPeer(target) {
    peer = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    localStream.getTracks().forEach(track => {
        peer.addTrack(track, localStream);
    });

    peer.ontrack = e => {
        document.getElementById("remoteAudio").srcObject = e.streams[0];
    };

    peer.onicecandidate = e => {
        if (e.candidate) {
            socket.emit("ice_candidate", {
                to: target,
                candidate: e.candidate
            });
        }
    };
}

// INCOMING CALL
socket.on("incoming_call", (data) => {
    caller = data.from;

    document.getElementById("status").innerText = "Incoming call...";
    document.getElementById("acceptBtn").style.display = "inline";
    document.getElementById("rejectBtn").style.display = "inline";
});

// ACCEPT
document.getElementById("acceptBtn").onclick = async () => {
    createPeer(caller);
    document.getElementById("status").innerText = "Connected";
};

// REJECT
document.getElementById("rejectBtn").onclick = () => {
    location.href = "/chat";
};
</script>

</body>
</html>
