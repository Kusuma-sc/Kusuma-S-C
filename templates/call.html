<!DOCTYPE html>
<html>
<head>
    <title>Chat Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        .header {
            background: #667eea;
            color: white;
            padding: 15px;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .sidebar {
            width: 30%;
            background: #fff;
            border-right: 1px solid #ccc;
            padding: 10px;
        }

        .chat {
            width: 70%;
            padding: 20px;
        }

        .user {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .user:hover {
            background: #eee;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>

<div class="header">
    Logged in as: {{ email }}
</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Call User</h3>
        <input type="text" id="target" placeholder="Enter email">
        <button onclick="callUser()">Call</button>
    </div>

    <!-- Chat -->
    <div class="chat">
        <h3>Chat</h3>
        <div id="messages"></div>

        <input type="text" id="msg">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();

function sendMessage() {
    const msg = document.getElementById("msg").value;

    socket.emit("message", {
        msg: msg,
        user: "{{ email }}"
    });
}

socket.on("message", (data) => {
    document.getElementById("messages").innerHTML +=
        "<p><b>" + data.user + ":</b> " + data.msg + "</p>";
});

// Call user
function callUser() {
    const target = document.getElementById("target").value;

    socket.emit("call_user", {
        from: "{{ email }}",
        target: target
    });

    window.location.href = "/call";
}
</script>

</body>
</html>
