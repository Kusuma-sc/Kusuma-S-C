<!DOCTYPE html>
<html>
<head>
<title>Call</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
<h2>Calling {{ target }}</h2>

<button onclick="accept()">Accept</button>
<button onclick="reject()">Reject</button>

<p id="status">Waiting...</p>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();

socket.on("connect", ()=>{
    socket.emit("register", {email: "{{ email }}"});

    socket.emit("call_user", {
        to: "{{ target }}",
        from: "{{ email }}"
    });
});

// RECEIVE CALL
socket.on("incoming_call", (data)=>{
    document.getElementById("status").innerText = "Incoming from " + data.from;
});

// ACCEPT
function accept(){
    socket.emit("accept_call", {
        to: "{{ target }}",
        from: "{{ email }}"
    });
    document.getElementById("status").innerText = "Connected";
}

// REJECT
function reject(){
    socket.emit("reject_call", {
        to: "{{ target }}",
        from: "{{ email }}"
    });
    document.getElementById("status").innerText = "Rejected";
}

// RESPONSE
socket.on("call_accepted", ()=>{
    document.getElementById("status").innerText = "Call Accepted";
});

socket.on("call_rejected", ()=>{
    document.getElementById("status").innerText = "Call Rejected";
});
</script>

</body>
</html>
