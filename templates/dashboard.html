<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center/cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background: rgba(0,0,0,0.7);
    padding:25px;
    border-radius:15px;
    width:350px;
    color:white;
}

input, button {
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button {
    background:#00c6ff;
    color:white;
    cursor:pointer;
}

#chat {
    height:150px;
    overflow:auto;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h3>👤 {{ email }}</h3>

<!-- CALL -->
<input id="targetEmail" placeholder="Enter email to call">
<button onclick="callUser()">📞 Start Call</button>

<hr>

<!-- CHAT -->
<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();

// SEND MESSAGE
function sendMsg(){
    const msg = document.getElementById("msg").value;

    if(!msg) return;

    socket.emit("send_message", {
        msg: msg,
        user: "{{ email }}"
    });

    document.getElementById("msg").value = "";
}

// RECEIVE MESSAGE
socket.on("receive_message", data=>{
    document.getElementById("chat").innerHTML +=
        "<p><b>"+data.user+":</b> "+data.msg+"</p>";
});

// CALL
function callUser(){
    const target = document.getElementById("targetEmail").value;

    if(!target){
        alert("Enter email");
        return;
    }

    window.location.href = "/call?target=" + target;
}
</script>
<script>
const socket = io();

// 📞 INCOMING CALL POPUP (FIX)
socket.on("incoming_call", (data) => {

    const accept = confirm("📞 Incoming call from " + data.from);

    if (accept) {
        // 👉 go to call page
        window.location.href = "/call?target=" + data.from;
    } else {
        // 👉 reject call
        socket.emit("reject_call", {
            to: data.from
        });
    }
});
</script>

</body>
</html>
