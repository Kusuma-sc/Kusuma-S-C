<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

let caller = "";

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right, #075E54, #128C7E);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:white;
    width:350px;
    padding:20px;
    border-radius:10px;
}

button {
    background:#25D366;
    color:white;
    padding:10px;
    border:none;
    width:100%;
    margin:5px 0;
}

input {
    width:100%;
    padding:10px;
    margin:5px 0;
}

.popup {
    display:none;
    position:fixed;
    top:40%;
    left:35%;
    background:black;
    color:white;
    padding:20px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="box">

<h3>{{ email }}</h3>

<input id="targetEmail" placeholder="Enter email to call">
<button onclick="callUser()">📞 Call</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
<p id="callerText"></p>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>


const socket = io();
let caller = "";

// ✅ REGISTER USER
socket.on("connect", () => {
    socket.emit("register", { email: "{{ email }}" });
});

// 📞 CALL BUTTON
function callUser(){
    const target = document.getElementById("targetEmail").value;

    if(!target){
        alert("Enter email");
        return;
    }

    socket.emit("call_user", {
        from: "{{ email }}",
        to: target
    });

    alert("Calling " + target);
}

// 📞 RECEIVE CALL (ONLY RECEIVER GETS THIS)
socket.on("incoming_call", (data)=>{
    caller = data.from;

    document.getElementById("popup").style.display = "block";
    document.getElementById("callerText").innerText =
        "📞 Call from " + caller;
});

// ✅ ACCEPT
function acceptCall(){
    socket.emit("accept_call", {
        from: "{{ email }}",
        to: caller
    });

    window.location.href = "/call?target=" + caller;
}

// ❌ REJECT
function rejectCall(){
    socket.emit("reject_call", {
        to: caller
    });

    document.getElementById("popup").style.display = "none";
}

// 🔁 CALLER SIDE REDIRECT
socket.on("call_accepted", (data)=>{
    window.location.href = "/call?target=" + data.from;
});

// ❌ CALL REJECTED
socket.on("call_rejected", ()=>{
    alert("Call rejected");
});

</script>

</body>
</html>
