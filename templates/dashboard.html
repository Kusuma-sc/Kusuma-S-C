<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
<h3>{{ email }}</h3>

<input id="target" placeholder="Enter email to call">
<button onclick="callUser()">Call</button>

<hr>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>

<div id="chat"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<p id="caller"></p>
<button onclick="acceptCall()">Accept</button>
<button onclick="rejectCall()">Reject</button>
</div>

<audio id="ringtone" src="/static/ringtone.mp3" loop></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();

function callUser() {
    const target = document.getElementById("targetEmail").value;
    const myEmail = "{{ email }}";

    if (!target) {
        alert("Enter email");
        return;
    }

    socket.emit("call_user", {
        from: myEmail,
        to: target
    });
}

// listen for acceptance
socket.on("call_accepted", (data) => {
    window.location.href = "/call?target=" + data.from;
});

socket.on("call_rejected", () => {
    alert("Call Rejected");
});
</script>
<audio id="ringtone" src="/static/ringtone.mp3" loop></audio>

<script>
socket.on("incoming_call", (data) => {
    const ringtone = document.getElementById("ringtone");
    ringtone.play();

    const accept = confirm("Incoming call from " + data.from);

    ringtone.pause();

    if (accept) {
        socket.emit("accept_call", {
            from: "{{ email }}",
            to: data.from
        });

        window.location.href = "/call?target=" + data.from;
    } else {
        socket.emit("reject_call", {
            to: data.from
        });
    }
});
</script>

</body>
</html>
