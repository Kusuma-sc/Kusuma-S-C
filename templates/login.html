<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

input, button {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button {
    background:#667eea;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<form action="/dashboard" method="POST">
<input type="email" name="email" placeholder="Email" required>
<button>Login</button>
</form>

</div>

</body>
</html>
